name: Weekly History Update

on:
  schedule:
    - cron: "59 23 * * 0"
  workflow_dispatch:

jobs:
  call-function:
    runs-on: ubuntu-latest

    steps:
      - name: Call Supabase Function
        run: |
          curl -X POST "https://lgygwpvectxaxdiujjna.supabase.co/functions/v1/weekly-history-update" \
          -H "Content-Type: application/json" \
          -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
          -d "{}"